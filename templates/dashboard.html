<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swasthya AI Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent: #238636;
            --border: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        
        /* Layout Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            grid-column: span 12;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }
        .header h1 { margin: 0; font-size: 1.5rem; color: #fff; }
        .refresh-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.2s;
        }
        .refresh-btn:hover { background-color: #21262d; }

        /* KPI Cards */
        .kpi-card {
            grid-column: span 4;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }
        .kpi-card h3 { margin: 0 0 10px; font-size: 0.9rem; color: #8b949e; text-transform: uppercase; }
        .kpi-card p { margin: 0; font-size: 2.5rem; font-weight: 700; color: #fff; }

        /* Chart Containers */
        .chart-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Interactive Chart spans full width */
        .full-width { grid-column: span 12; height: 400px; }
        
        /* Image Charts span half width */
        .half-width { grid-column: span 6; min-height: 400px; }

        .chart-card h4 {
            align-self: flex-start;
            margin: 0 0 15px 0;
            color: #fff;
        }

        /* The Embedded Images */
        .generated-chart {
            max-width: 100%;
            max-height: 350px;
            border-radius: 4px;
            /* Optional: Invert colors if your matplotlib chart is white background */
            /* filter: invert(0.9) hue-rotate(180deg); */ 
        }

        /* Mobile Responsiveness */
        @media (max-width: 900px) {
            .kpi-card, .half-width { grid-column: span 12; }
        }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        <div class="header">
            <h1>🏥 Swasthya AI Dashboard</h1>
            <a href="/dashboard" class="refresh-btn">🔄 Refresh Data</a>
        </div>

        <div class="kpi-card">
            <h3>Total Users</h3>
            <p>{{ total_users }}</p>
        </div>
        <div class="kpi-card">
            <h3>Active (24h)</h3>
            <p>{{ active_24h }}</p>
        </div>
        <div class="kpi-card">
            <h3>Total Messages</h3>
            <p>{{ total_messages }}</p>
        </div>

        <div class="chart-card full-width">
            <h4>Live Search Trends (Interactive)</h4>
            <div style="width: 100%; height: 100%; position: relative;">
                <canvas id="jsChart"></canvas>
            </div>
        </div>

        <div class="chart-card half-width">
            <h4>Disease Distribution (Generated by Python)</h4>
            <img src="/api/piechart?top=10" class="generated-chart" alt="Loading Pie Chart...">
        </div>

        <div class="chart-card half-width">
            <h4>Top Active Users (Generated by Python)</h4>
            <img src="/api/city-bar?limit=10" class="generated-chart" alt="Loading Bar Chart...">
        </div>
    </div>

    <script id="disease-data" type="application/json">{{ disease_data | tojson }}</script>

    <script>
        // Data passed from Flask (parsed from embedded JSON)
        const diseaseData = JSON.parse(document.getElementById('disease-data').textContent || '{}');
        const labels = Object.keys(diseaseData);
        const values = Object.values(diseaseData);

        const ctx = document.getElementById('jsChart').getContext('2d');
        new Chart(ctx, {
            type: 'line', // Changed to Line for variety, or keep 'bar'
            data: {
                labels: labels,
                datasets: [{
                    label: 'Search Frequency',
                    data: values,
                    backgroundColor: 'rgba(35, 134, 54, 0.2)',
                    borderColor: '#238636',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: '#30363d' },
                        ticks: { color: '#8b949e' } 
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#8b949e' } 
                    }
                }
            }
        });
    </script>

</body>
</html>
