<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swasthya AI Command Center</title>
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #161b22;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --accent-green: #238636;
            --accent-red: #da3633;
            --border: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* --- LAYOUT --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }

        /* --- HEADER --- */
        .header {
            grid-column: span 12;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 10px;
        }
        .header h1 { margin: 0; font-size: 1.8rem; }
        .refresh-btn {
            background-color: var(--card-bg);
            color: var(--accent-green);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .refresh-btn:hover { background-color: #21262d; }

        /* --- KPI CARDS --- */
        .kpi-card {
            grid-column: span 4;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .kpi-card h3 { color: var(--text-muted); font-size: 0.9rem; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-card p { font-size: 2.5rem; font-weight: 700; margin: 10px 0 0 0; }

        /* --- AI INSIGHT CARD (The "Magic" Section) --- */
        .ai-card {
            grid-column: span 12;
            background: linear-gradient(145deg, #1f2937, #161b22);
            border: 1px solid var(--accent-green);
            border-radius: 8px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }
        .ai-card h2 { margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .ai-status { font-size: 0.9rem; background: #238636; padding: 2px 8px; border-radius: 12px; }
        #ai-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #d1d5db;
            white-space: pre-wrap; /* Keeps formatting */
        }
        .loading-pulse {
            display: inline-block;
            width: 10px; height: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* --- CHART CONTAINERS --- */
        .chart-card {
            grid-column: span 6;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .chart-card h4 { align-self: flex-start; margin-top: 0; color: var(--text-muted); }
        .chart-img {
            max-width: 100%;
            height: auto;
            max-height: 450px;
            border-radius: 4px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .kpi-card { grid-column: span 12; }
            .chart-card { grid-column: span 12; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🏥 Swasthya AI Command Center</h1>
            <a href="/dashboard" class="refresh-btn">🔄 Refresh Dashboard</a>
        </div>

        <div class="kpi-card">
            <h3>Total Users</h3>
            <p>{{ total_users }}</p>
        </div>
        <div class="kpi-card">
            <h3>Active Today</h3>
            <p style="color: var(--accent-green);">{{ active_24h }}</p>
        </div>
        <div class="kpi-card">
            <h3>Total Messages</h3>
            <p>{{ total_messages }}</p>
        </div>

        <div class="ai-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <h2>✨ AI Outbreak Analysis <span class="ai-status">Live</span></h2>
                
                <button id="broadcastBtn" onclick="broadcastAlert()" style="display:none; background: #da3633; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                    📢 Broadcast Alert
                </button>
            </div>

            <div id="ai-loading">
                <p>Analyzing recent health data for anomalies... <span class="loading-pulse"></span></p>
            </div>
            <div id="ai-content" style="display: none;">
                <p id="ai-text"></p>
            </div>
        </div>

        <div class="chart-card">
            <h4>Disease Distribution (Last 24h)</h4>
            <img src="/api/piechart?t={{ total_messages }}" class="chart-img" alt="Loading Disease Pie Chart...">
        </div>

        <div class="chart-card">
            <h4>Affected Cities (Last 24h)</h4>
            <img src="/api/city-bar?t={{ total_messages }}" class="chart-img" alt="Loading City Bar Graph...">
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetchAIInsights();
        });

        async function fetchAIInsights() {
            try {
                const response = await fetch('/api/ai-insight');
                const data = await response.json();
                
                // Hide loading, show content
                document.getElementById('ai-loading').style.display = 'none';
                document.getElementById('ai-content').style.display = 'block';
                
                // Typewriter effect or just text
                const textField = document.getElementById('ai-text');
                textField.innerText = data.insight || "No insights available.";
                
                // Optional: Alert style if outbreak detected
                if (data.insight.includes("Outbreak") || data.insight.includes("⚠️")) {
                    textField.style.color = "#ff7b72"; // Red for danger
                    textField.style.fontWeight = "bold";
                }

            } catch (error) {
                console.error("Error fetching AI insight:", error);
                document.getElementById('ai-loading').innerText = "⚠️ AI Analysis Failed to Load.";
            }
        }

        async function fetchAIInsights() {
            try {
                const response = await fetch('/api/ai-insight');
                const data = await response.json();
                
                document.getElementById('ai-loading').style.display = 'none';
                document.getElementById('ai-content').style.display = 'block';
                
                const textField = document.getElementById('ai-text');
                textField.innerText = data.insight || "No insights available.";
                
                // Show Broadcast Button ONLY if there is an outbreak
                if (data.insight.includes("Outbreak") || data.insight.includes("⚠️")) {
                    textField.style.color = "#ff7b72"; 
                    textField.style.fontWeight = "bold";
                    document.getElementById('broadcastBtn').style.display = 'block'; // Show button
                } else {
                    document.getElementById('broadcastBtn').style.display = 'none';
                }

            } catch (error) {
                console.error("Error:", error);
            }
        }

        async function broadcastAlert() {
            if(!confirm("⚠️ Are you sure you want to send this ALERT to ALL users?")) return;
            
            const btn = document.getElementById('broadcastBtn');
            btn.disabled = true;
            btn.innerText = "Sending...";
            
            try {
                const response = await fetch('/api/broadcast-alert', { method: 'POST' });
                const res = await response.json();
                alert(res.message);
                btn.innerText = "📢 Broadcast Sent";
            } catch (error) {
                alert("Failed to send broadcast.");
                btn.disabled = false;
                btn.innerText = "📢 Broadcast Alert";
            }
        }
    </script>

</body>
</html>
