  utter_good_or:
    - text: "ଉତ୍ତମ, ମୁଁ ଆପଣଙ୍କୁ ସାହାଯ୍ୟ କରିବା ଜାରି ରଖିବି!"

  utter_cheer_up_en:
    - text: "Here is something to cheer you up:"
  utter_cheer_up_hi:
    - text: "आपको खुश करने के लिए यह रहा:"
  utter_cheer_up_bn:
    - text: "আপনাকে খুশি করার জন্য এই নিন:"
  utter_cheer_up_or:
    - text: "ଆପଣଙ୍କୁ ଖୁସି କରିବା ପାଇଁ ଏହା ରହିଲା:"

  utter_happy_path_en:
    - text: "I am happy to help you."
  utter_happy_path_hi:
